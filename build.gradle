apply plugin: "java"

repositories {
    mavenCentral()
}

task copyLibs(type: Copy) {
    into "${buildDir}/libs"
    from configurations.runtime
}

task copyTestLibs(type: Copy) {
    into "${buildDir}/test"
    from configurations.testCompile
}

task copyPlugins(type: Copy) {
    into "${buildDir}/plugins"
    from configurations.testCompile
    include "sonar-*-plugin*.jar"
}

task infra(dependsOn: ["copyLibs", "copyTestLibs", "jar"])

test.dependsOn(copyPlugins)

dependencies {
    compile("org.sonarsource.sonarlint.core:sonarlint-core:2.18.0.1070")
    compile("org.sonarsource.sonarlint.core:sonarlint-client-api:2.18.0.1070")
    compile("org.sonarsource.sonarlint:sonarlint-cli:2.1.0.566")
    compile("com.google.code.gson:gson:2.8.6")

    // Plugins
    testCompile("org.sonarsource.java:sonar-java-plugin:6.13.0.25138")

    testCompile("org.assertj:assertj-core:3.19.0")
    testCompile("org.skyscreamer:jsonassert:1.5.0")
    testCompile("junit:junit:4.13.2")
}

test {
    outputs.upToDateWhen { false }
    testLogging {
        events "passed", "skipped", "failed", "standardOut", "standardError"
        exceptionFormat "full"
    }
}
